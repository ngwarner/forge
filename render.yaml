services:
  - type: web
    name: forge
    runtime: python
    rootDir: web
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --worker-class=gevent --bind=0.0.0.0:$PORT --timeout=120
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false   # set this in Render dashboard — optional, users can bring their own
    autoDeploy: true
